title: My CTF Blog
description: My CTF journey and writeups
theme: minima
plugins:
  - jekyll-feed
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo

collections:
  notes:
    output: true
    permalink: /notes/:path/
    sort_by: date
    sort_order: descending

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      custom_css: true
  - scope:
      path: "_notes"
    values:
      layout: "note"

include:
  - _notes
  - _includes
  - _layouts
  - assets/css
  - assets/js


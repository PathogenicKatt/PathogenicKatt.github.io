title: My CTF Blog
description: My CTF journey and writeups
theme: minima
plugins:
  - jekyll-feed

collections:
  notes:
    output: true
    permalink: /notes/:path/
    sort_by: date
    sort_order: descending

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      custom_css: true
  - scope:
      path: "_notes"
    values:
      layout: "note"

include:
  - _notes
  - _includes
  - _layouts
  - assets/css
  - assets/js

markdown: kramdown
kramdown:
  input: GFM